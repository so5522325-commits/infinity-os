<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Real OS v6.6</title>
    <style>
        /* (Aapka purana CSS yahan add karein) */
        .profile-avatar-frame { width: 90px; height: 90px; background: linear-gradient(135deg, #4f46e5, #00f2fe); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; color: #fff; font-weight: 700; background-size: cover; background-position: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="page-profile" class="app-page">
        <div class="profile-hero">
            <div class="profile-avatar-frame" id="prof-initial" onclick="document.getElementById('dp-input').click()">U</div>
            <input type="file" id="dp-input" style="display:none" accept="image/*" onchange="window.uploadDP(event)">
            <div class="profile-meta">
                <h3 id="prof-name">User Session</h3>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config
        const app = initializeApp({ /* Aapki Firebase Config Details */ });
        const db = getDatabase(app);
        window.db = db; window.ref = ref; window.set = set; window.get = get; window.child = child;

        // DP Upload Function
        window.uploadDP = async function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append("image", file);
            
            alert("Uploading...");
            const response = await fetch("https://api.imgbb.com/1/upload?key=278a6e2f330ce2f2a0f721798f0ed8f3", {
                method: "POST", body: formData
            });
            const result = await response.json();
            if (result.success) {
                const url = result.data.url;
                const user = document.getElementById('prof-name').innerText.replace(/[^a-zA-Z0-9]/g, "_");
                await set(ref(db, 'users/' + user + '/profilePic'), url);
                document.getElementById('prof-initial').style.backgroundImage = `url('${url}')`;
                document.getElementById('prof-initial').innerText = "";
                alert("DP Updated!");
            }
        };

        // Load DP Function (Ise handleLogin mein call karein)
        window.loadUserProfile = function(user) {
            const cleanUser = user.replace(/[^a-zA-Z0-9]/g, "_");
            get(child(ref(db), 'users/' + cleanUser + '/profilePic')).then(snapshot => {
                if (snapshot.exists()) {
                    const prof = document.getElementById('prof-initial');
                    prof.style.backgroundImage = `url('${snapshot.val()}')`;
                    prof.innerText = "";
                }
            });
        };
        
        // (Aapke baaki functions jaise handleLogin, handleRegister yahan honge)
    </script>
</body>
</html>
