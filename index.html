<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity OS | Social & Battle</title>
    <style>
        body { margin: 0; background: #050508; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .page { display: none; height: calc(100vh - 80px); padding: 20px; overflow-y: auto; }
        .active { display: block !important; }
        
        /* Premium Navigation Bar */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #09090e; display: none; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-btn { background: none; border: none; color: #6b7280; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-btn.active-nav { color: #00f2fe; }

        /* Login Styling */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .input-field { padding: 14px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 20px; width: 280px; outline: none; }
        .login-btn { background: linear-gradient(135deg, #4f46e5, #00f2fe); padding: 15px 40px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-page" class="page active">
        <div class="auth-container">
            <h2 style="color:#00f2fe; margin-bottom:20px;">INFINITY OS</h2>
            <input type="text" id="username" class="input-field" placeholder="Enter Username">
            <button class="login-btn" onclick="login()">LOGIN SESSION</button>
        </div>
    </div>

    <!-- FEED -->
    <div id="feed-page" class="page"><h3>Latest Posts</h3><p>Data streaming from nodes...</p></div>

    <!-- REELS -->
    <div id="reel-page" class="page"><h3>Reels</h3><p>Video Feed loading...</p></div>

    <!-- GAME -->
    <div id="game-page" class="page">
        <h3>Battle Arena</h3>
        <div id="game-container" style="width:300px; height:200px; border:1px solid #33ff33; margin:20px auto; position:relative;">
            <div id="player" style="width:30px; height:30px; background:#00f2fe; position:absolute; bottom:0; left:0;"></div>
        </div>
    </div>

    <!-- PROFILE -->
    <div id="profile-page" class="page">
        <h3>Profile</h3>
        <p id="user-display"></p>
    </div>

    <!-- NAVIGATION -->
    <div class="navbar" id="nav-bar">
        <button class="nav-btn" onclick="navigate('feed-page', this)">Feed</button>
        <button class="nav-btn" onclick="navigate('reel-page', this)">Reels</button>
        <button class="nav-btn" onclick="navigate('game-page', this)">Game</button>
        <button class="nav-btn" onclick="navigate('profile-page', this)">Profile</button>
    </div>

    <script>
        function login() {
            const name = document.getElementById('username').value;
            if(name.trim() !== "") {
                document.getElementById('user-display').innerText = "Developer: " + name;
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('feed-page').classList.add('active');
                document.getElementById('nav-bar').style.display = 'flex';
            } else {
                alert("Please enter a name!");
            }
        }

        function navigate(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            btn.classList.add('active-nav');
        }

        // Game Movement
        const player = document.getElementById('player');
        let x = 0;
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' && x < 270) x += 20;
            if(e.key === 'ArrowLeft' && x > 0) x -= 20;
            player.style.left = x + 'px';
        });
    </script>
</body>
</html>
