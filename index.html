<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OS | Version 1.1</title>
    <style>
        body { background-color: #050508; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .page { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; }
        button { padding: 12px; background-color: #6200ea; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #7c4dff; }
        .post-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 4px solid #6200ea; margin-bottom: 10px; }
        .post-author { font-size: 12px; font-weight: bold; color: #b39ddb; margin-bottom: 5px; display: block; }
        .post-time { font-size: 10px; color: #888; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- Login Page -->
    <div id="login-page" class="page">
        <h2 style="text-align: center; color: #6200ea;">Nexus OS</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="auth-btn" onclick="handleAuth()">Login</button>
        <p id="auth-mode" onclick="toggleAuthMode()" style="cursor:pointer; font-size: 12px; text-align: center;">Don't have an account? Sign Up</p>
    </div>

    <!-- Dashboard -->
    <div id="main-screen" class="page" style="display: none;">
        <h3 style="color: #6200ea;">Nexus Dashboard</h3>
        <textarea id="post-text" placeholder="Kya naya chal raha hai?" rows="3"></textarea>
        <button onclick="createPost()">Post Update</button>
        <div id="feed">
            <div id="posts-list"></div>
        </div>
        <button onclick="logout()" style="background: #e91e63; margin-top: 20px;">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC32qR8fW2aNa8ubI91CY70oOII9HUFPIQ",
            authDomain: "infinityos-1cf63.firebaseapp.com",
            projectId: "infinityos-1cf63",
            storageBucket: "infinityos-1cf63.firebasestorage.app",
            messagingSenderId: "1027693906170",
            appId: "1:1027693906170:web:6b20c3ec3a54c9e1c0e143"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth Functions
        window.handleAuth = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('auth-btn').innerText;
            if (btn === "Login") signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
            else createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        window.toggleAuthMode = () => {
            const btn = document.getElementById('auth-btn');
            const mode = document.getElementById('auth-mode');
            btn.innerText = (btn.innerText === "Login") ? "Sign Up" : "Login";
            mode.innerText = (btn.innerText === "Login") ? "Don't have an account? Sign Up" : "Already have an account? Login";
        };

        window.logout = () => signOut(auth);

        // Updated Post Function (With Author info)
        window.createPost = async () => {
            const text = document.getElementById('post-text').value;
            const user = auth.currentUser;
            if (text && user) {
                await addDoc(collection(db, "posts"), { 
                    content: text, 
                    author: user.email, 
                    timestamp: serverTimestamp() 
                });
                document.getElementById('post-text').value = '';
            } else {
                alert("Login zaroori hai!");
            }
        };

        // UI State
        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-page').style.display = user ? 'none' : 'flex';
            document.getElementById('main-screen').style.display = user ? 'flex' : 'none';
        });

        // Real-time Feed with Author
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('posts-list');
            list.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const time = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : 'Just now';
                list.innerHTML += `
                    <div class="post-card">
                        <span class="post-author">${data.author || 'Anonymous'}</span>
                        <p>${data.content}</p>
                        <span class="post-time">${time}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
