<div id="page-profile" class="app-page">
    <h2 style="color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 5px;">Identity Management Node</h2>
    <div class="profile-wrapper">
        <div class="profile-hero">
            <div class="profile-avatar-frame" id="prof-initial" style="cursor: pointer;" onclick="document.getElementById('dp-input').click()">U</div>
            <input type="file" id="dp-input" style="display:none" accept="image/*" onchange="uploadDP(event)">
            
            <div class="profile-meta">
                <h3 id="prof-name">User Session</h3>
                <p id="prof-node-id">NODE-ID</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // ... (Aapka purana Firebase import yahi rahega) ...

    // DP UPLOAD FUNCTION
    window.uploadDP = async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("image", file);
        const API_KEY = "278a6e2f330ce2f2a0f721798f0ed8f3"; 
        
        alert("DP upload ho rahi hai...");

        const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
            method: "POST",
            body: formData
        });
        
        const result = await response.json();
        if (result.success) {
            const imageUrl = result.data.url;
            const userName = document.getElementById('prof-name').innerText;
            const cleanUser = userName.replace(/[^a-zA-Z0-9]/g, "_");
            
            await set(ref(db, 'users/' + cleanUser + '/profilePic'), imageUrl);
            document.getElementById('prof-initial').style.backgroundImage = `url('${imageUrl}')`;
            document.getElementById('prof-initial').innerText = ""; 
            alert("DP Update ho gayi!");
        }
    };

    // LOAD DP FUNCTION (Isse handleLogin ke andar call karein)
    window.loadUserProfile = function(cleanUser) {
        get(child(ref(db), 'users/' + cleanUser + '/profilePic')).then((snapshot) => {
            if (snapshot.exists()) {
                const savedUrl = snapshot.val();
                const profElement = document.getElementById('prof-initial');
                profElement.style.backgroundImage = `url('${savedUrl}')`;
                profElement.innerText = "";
            }
        });
    }
</script>
