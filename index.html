 <!-- Is code ko copy karke purane code ki jagah paste karein -->
<!-- Maine profile avatar ke liye 'onclick' event aur hidden file input add kiya hai -->

<div class="profile-hero">
    <!-- Click karne par file upload khulega -->
    <div class="profile-avatar-frame" id="prof-initial" onclick="document.getElementById('dp-upload').click()" style="cursor: pointer;">U</div>
    <!-- Hidden file input -->
    <input type="file" id="dp-upload" style="display:none" accept="image/*" onchange="uploadProfilePic(event)">
    
    <div class="profile-meta">
        <h3 id="prof-name">User Session</h3>
        <p><span class="glow-dot"></span> <span style="color: #10b981; font-weight: 600;">Active Identity Core</span></p>
    </div>
</div>

<script>
    // DP Upload Logic (ImgBB API integration)
    window.uploadProfilePic = async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("image", file);

        // ImgBB API se photo upload
        alert("DP upload ho rahi hai, kripya prateeksha karein...");
        
        try {
            const response = await fetch("https://api.imgbb.com/1/upload?key=278a6e2f330ce2f2a0f721798f0ed8f3", {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                const imageUrl = result.data.url;
                
                // Avatar update
                const avatar = document.getElementById('prof-initial');
                avatar.style.backgroundImage = `url('${imageUrl}')`;
                avatar.style.backgroundSize = "cover";
                avatar.style.backgroundPosition = "center";
                avatar.innerText = ""; // 'U' hat jayega

                alert("DP successfully update ho gayi!");
            }
        } catch (error) {
            alert("Upload failed. Internet check karein.");
        }
    };
</script>
