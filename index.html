<!DOCTYPE html>
<html>
<head>
    <style>
        .app-page { display: none; }
        .app-page.page-active { display: block; }
        .video-showcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: #09090e; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <nav class="premium-sidebar">
            <ul class="nav-menu-list">
                <li id="btn-console" class="active" onclick="switchPage('page-console', 'btn-console')">Cloud Console</li>
                <li id="btn-creator" onclick="switchPage('page-creator', 'btn-creator')">Creator Node</li>
                <li id="btn-matrix" onclick="switchPage('page-matrix', 'btn-matrix')">Analytics Node</li>
                <li id="btn-profile" onclick="switchPage('page-profile', 'btn-profile')">User Profile</li>
                <li id="btn-feed" onclick="switchPage('page-feed', 'btn-feed')">🚀 Explore Feed</li>
            </ul>
        </nav>

        <main class="workspace">
            <div id="page-console" class="app-page page-active">...</div>
            <div id="page-creator" class="app-page">...</div>
            <div id="page-matrix" class="app-page">...</div>
            
            <div id="page-feed" class="app-page">
                <h2 style="color: #fff; margin-bottom: 20px;">Explore Feed</h2>
                <div id="feed-container" class="video-showcase-grid"></div>
            </div>

            <div id="page-profile" class="app-page">...</div>
        </main>
    </div>

    <script>
        window.switchPage = function(pageId, btnId) {
            document.querySelectorAll('.app-page').forEach(p => { p.classList.remove('page-active'); p.style.display = 'none'; });
            document.querySelectorAll('.nav-menu-list li').forEach(b => b.classList.remove('active'));
            
            const targetPage = document.getElementById(pageId);
            targetPage.style.display = 'block';
            targetPage.classList.add('page-active');
            document.getElementById(btnId).classList.add('active');
            
            if(pageId === 'page-feed') { loadGlobalFeed(); }
        };

        window.loadGlobalFeed = async function() {
            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = "<p style='color:#6b7280; text-align:center;'>Fetching Reels...</p>";
            
            try {
                const dbRef = ref(db, 'users');
                const snapshot = await get(dbRef);
                feedContainer.innerHTML = "";
                
                if (snapshot.exists()) {
                    snapshot.forEach((userSnapshot) => {
                        const userData = userSnapshot.val();
                        if (userData.posts) {
                            Object.values(userData.posts).forEach((post) => {
                                const card = document.createElement('div');
                                card.className = 'video-card';
                                card.innerHTML = `
                                    ${post.mediaType === 'video' 
                                        ? `<video src="${post.media}" style="width:100%; border-radius:12px;" controls></video>` 
                                        : `<img src="${post.media}" style="width:100%; border-radius:12px;">`}
                                    <div style="padding:10px;">
                                        <p style="font-weight:600; color:#fff;">@${userSnapshot.key}</p>
                                        <p style="font-size:13px; color:#6b7280;">${post.caption}</p>
                                    </div>
                                `;
                                feedContainer.appendChild(card);
                            });
                        }
                    });
                } else {
                    feedContainer.innerHTML = "<p style='color:#6b7280; text-align:center;'>No posts found.</p>";
                }
            } catch(e) { 
                feedContainer.innerHTML = "<p style='color:red; text-align:center;'>Error loading feed.</p>"; 
            }
        };
    </script>
</body>
</html>
