<!DOCTYPE html>
<html>
<head>
    <style>
        /* CSS Fix: Sahi tarika */
.app-page { 
    display: none; /* Element ko chupaane ke liye 'none' sahi value hai */
}

.app-page.page-active { 
    display: block !important; /* Jab active class ho, tab dikhaye */
}

.video-showcase-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    gap: 20px; 
    padding: 20px; 
}

.video-card { 
    background: #09090e; 
    border: 1px solid rgba(255,255,255,0.05); 
    border-radius: 16px; 
    padding: 15px; 
    color: white; 
}

.workspace { 
    background: #000; 
    min-height: 100vh; 
    color: white; 
}
        
</head>
<body>

    <div id="home-screen">
        <nav class="premium-sidebar">
            <ul class="nav-menu-list">
                <li id="btn-console" onclick="switchPage('page-console', 'btn-console')">Cloud Console</li>
                <li id="btn-feed" onclick="switchPage('page-feed', 'btn-feed')">🚀 Explore Feed</li>
            </ul>
        </nav>

        <main class="workspace">
            <div id="page-console" class="app-page page-active"><h1>Cloud Console</h1></div>
            
            <div id="page-feed" class="app-page">
                <h2 style="padding: 20px;">Explore Feed</h2>
                <div id="feed-container" class="video-showcase-grid"></div>
            </div>
        </main>
    </div>

    <script>
        // Fix: Navigation Logic
        window.switchPage = function(pageId, btnId) {
            document.querySelectorAll('.app-page').forEach(p => { p.style.display = 'none'; p.classList.remove('page-active'); });
            const targetPage = document.getElementById(pageId);
            if(targetPage) {
                targetPage.style.display = 'block';
                targetPage.classList.add('page-active');
            }
            if(pageId === 'page-feed') { loadGlobalFeed(); }
        };

        // Fix: Data Fetching Logic
        window.loadGlobalFeed = async function() {
            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = "<p style='text-align:center;'>Fetching Reels...</p>";
            
            try {
                // Ensure 'db' and 'ref' are initialized in your main script
                const dbRef = ref(db, 'users');
                const snapshot = await get(dbRef);
                feedContainer.innerHTML = "";
                
                if (snapshot.exists()) {
                    snapshot.forEach((userSnapshot) => {
                        const userData = userSnapshot.val();
                        if (userData.posts) {
                            Object.values(userData.posts).forEach((post) => {
                                const card = document.createElement('div');
                                card.className = 'video-card';
                                card.innerHTML = `
                                    ${post.mediaType === 'video' ? `<video src="${post.media}" style="width:100%; border-radius:12px;" controls></video>` : `<img src="${post.media}" style="width:100%; border-radius:12px;">`}
                                    <div style="padding:10px;">
                                        <p style="font-weight:600;">@${userSnapshot.key}</p>
                                    </div>
                                `;
                                feedContainer.appendChild(card);
                            });
                        }
                    });
                }
            } catch(e) { 
                feedContainer.innerHTML = "<p style='color:red;'>Error loading feed. Check Console.</p>";
                console.error("Firebase Error:", e);
            }
        };
    </script>
</body>
</html>
